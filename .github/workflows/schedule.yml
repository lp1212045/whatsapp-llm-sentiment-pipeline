name: Daily WhatsApp Data Process
on:
  workflow_dispatch:
    inputs:
      run_main:
        description: 'Run main.py (Fetch data & AI sentiment analysis)'
        required: true
        type: boolean
        default: true
      run_risk:
        description: 'Run risk_analysis.py (Sim Master risk evaluation)'
        required: true
        type: boolean
        default: true
      run_dashboard:
        description: 'Run dashboard.py (Update Dashboard charts)'
        required: true
        type: boolean
        default: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    # 💡 Feature: Cache pip dependencies to significantly speed up VM boot time
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create Google Service Account JSON
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_CREDENTIALS" > service_account.json
        
    - name: Step 1 - Run main.py (Raw to Daily Data)
      if: ${{ inputs.run_main }}
      env:
        POE_API_KEY: ${{ secrets.POE_API_KEY }}
      run: |
        python main.py
        
    - name: Step 2 - Run dashboard.py (Update Dashboard)
      if: ${{ inputs.run_dashboard }}
      run: |
        python dashboard.py --dashboard_id "YOUR_DASHBOARD_ID"
        
    - name: Step 3 - Run risk_analysis.py (Sim Master & Risk Profile)
      if: ${{ inputs.run_risk }}
      env:
        POE_API_KEY: ${{ secrets.POE_API_KEY }}
        PYTHONUNBUFFERED: "1"
      run: |
        python risk_analysis.py
